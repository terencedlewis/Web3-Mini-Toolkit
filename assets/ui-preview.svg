<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe2"/>
      <stop offset="100%" stop-color="#fdfaf2"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(15,118,110,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <linearGradient id="send-btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0b5f59"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(31,36,48,0.14)"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="680" height="520" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="30" y="30" width="620" height="460" rx="18" fill="rgba(255,255,255,0.72)" stroke="#ddd3bf" stroke-width="1" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="30" y="30" width="620" height="82" rx="18" fill="url(#header-grad)"/>
  <rect x="30" y="82" width="620" height="30" fill="url(#header-grad)"/>
  <rect x="30" y="111" width="620" height="1" fill="#ddd3bf"/>

  <!-- Header text -->
  <text x="58" y="77" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#1f2430">Web3 Mini Toolkit</text>
  <text x="58" y="101" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" fill="#5d667a">Connect MetaMask and send ETH with ethers.js</text>

  <!-- Body -->
  <!-- Recipient Address label -->
  <text x="58" y="147" font-family="Avenir Next, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#5d667a">RECIPIENT ADDRESS</text>
  <!-- Recipient input -->
  <rect x="58" y="155" width="564" height="40" rx="10" fill="#fffef9" stroke="#ddd3bf" stroke-width="1"/>
  <text x="74" y="180" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" fill="#aaa">0x...</text>

  <!-- Amount label -->
  <text x="58" y="218" font-family="Avenir Next, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#5d667a">AMOUNT (ETH)</text>
  <!-- Amount input -->
  <rect x="58" y="226" width="564" height="40" rx="10" fill="#fffef9" stroke="#ddd3bf" stroke-width="1"/>
  <text x="74" y="251" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" fill="#aaa">0.01</text>

  <!-- Connect Wallet button -->
  <rect x="58" y="284" width="162" height="42" rx="21" fill="#111827"/>
  <text x="139" y="310" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Connect Wallet</text>

  <!-- Send ETH button (disabled state) -->
  <rect x="232" y="284" width="120" height="42" rx="21" fill="url(#send-btn)" opacity="0.55"/>
  <text x="292" y="310" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Send ETH</text>

  <!-- Status card -->
  <rect x="58" y="346" width="564" height="96" rx="12" fill="#fff9ee" stroke="#ddd3bf" stroke-width="1"/>
  <text x="74" y="370" font-family="Avenir Next, Segoe UI, sans-serif" font-size="14" fill="#5d667a">Wallet is not connected.</text>
  <text x="74" y="393" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#5d667a">Account: -</text>
  <text x="74" y="414" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#5d667a">Network: -</text>
  <text x="74" y="436" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#aaa">Status messages will appear here after connecting</text>

  <!-- Safety note -->
  <text x="58" y="465" font-family="Avenir Next, Segoe UI, sans-serif" font-size="12" fill="#5d667a">Safety note: test on a testnet first. Do not send real value until you confirm recipient and amount.</text>
</svg>
